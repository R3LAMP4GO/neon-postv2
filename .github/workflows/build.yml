name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run build && npx electron-builder --win --x64 -p never

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: win-build
          path: |
            release/*-setup.exe
            release/*.zip
            release/latest.yml

  release:
    needs: [build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v7
        with:
          name: win-build
          path: release/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/*-setup.exe
            release/latest.yml
          body: |
            ## Neon Post ${{ github.ref_name }}

            Windows desktop AI agent with persistent memory.

            ### Install (one-liner)

            Open PowerShell and paste:

            Download `Neon-Post-*-x64-setup.exe` below and double-click, or see README for the PowerShell one-liner.

            **First launch:** Windows SmartScreen shows "unknown publisher" — click **More info → Run anyway** (installer is unsigned).
